name: Release soak

on:
  push:
    tags: ['v*']

jobs:
  soak:
    name: 30-min soak (Postgres 17)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: delaykit
          POSTGRES_PASSWORD: delaykit
          POSTGRES_DB: delaykit_test
        ports:
          - 5444:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://delaykit:delaykit@localhost:5444/delaykit_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run soak
