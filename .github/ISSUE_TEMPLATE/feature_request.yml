name: Feature request
description: Suggest a capability or API change
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case before proposing a solution. Features that map to a concrete user need are far more likely to land.
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: What did you have in mind?
      description: An API sketch, a workaround you're already using, or just a description of the desired behavior.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, patterns, or workarounds you looked at, and why they didn't fit.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: DelayKit is intentionally narrow — it runs your handler at a scheduled time and lets you cancel it. It is not a workflow engine or a job queue.
      options:
        - label: What I'm asking for is a timing primitive, not multi-step orchestration or queueing
          required: false
